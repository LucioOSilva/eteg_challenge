services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3333:3333"
    environment:
      ENVIRONMENT: ${ENVIRONMENT}
      DB_HOST: db
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      DB_NAME: ${DB_NAME}
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: >
      sh -c "if [ '$$ENVIRONMENT' = 'PRODUCTION' ];
             then node dist/main;
             else npm run start:dev;
             fi"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      VITE_ENVIRONMENT: ${VITE_ENVIRONMENT}
      VITE_PORT: ${VITE_PORT}
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: >
      sh -c "if [ '$$VITE_ENVIRONMENT' = 'PRODUCTION' ];
             then npm run build && npm run preview -- --port 3000 --host;
             else npm run dev -- --host;
             fi"
    depends_on:
      - backend

volumes:
  pgdata: